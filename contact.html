<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | TrippyDream</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">TrippyDream</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <header>
        <h1>Contact Us</h1>
        <p>Have a question or need travel advice? Reach out to the TrippyDream team.</p>
    </header>

    <main>
        <section class="recommendation-box">
            <form id="contactForm">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>

                <button type="button" onclick="alert('Thank you for your message! We will get back to you soon.')">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 TrippyDream Travel Recommendations</p>
    </footer>
</body>
</html>
